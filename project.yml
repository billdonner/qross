name: Qross
options:
  bundleIdPrefix: com.qross
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: NEAY582ME4

targets:
  Qross:
    type: application
    platform: iOS
    sources:
      - Qross
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qross.app
        INFOPLIST_FILE: Qross/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        MARKETING_VERSION: "0.2"
        CURRENT_PROJECT_VERSION: "3"
    entitlements:
      path: Qross/Qross.entitlements
    # dependencies:
    #   - target: QrossClip  # Re-enable when App Clip provisioning is set up

  QrossClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - QrossClip
      - path: Qross/Models
        group: Shared/Models
      - path: Qross/Services/APIClient.swift
        group: Shared/Services
      - path: Qross/Services/QuestionCache.swift
        group: Shared/Services
      - path: Qross/Views/BoardView.swift
        group: Shared/Views
      - path: Qross/Views/CellView.swift
        group: Shared/Views
      - path: Qross/Views/QuestionOverlay.swift
        group: Shared/Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qross.app.Clip
        INFOPLIST_FILE: QrossClip/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
    entitlements:
      path: QrossClip/QrossClip.entitlements

  QrossTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - QrossTests
    dependencies:
      - target: Qross
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qross.app.tests
        GENERATE_INFOPLIST_FILE: YES
